name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build — must match the tag you just pushed (e.g. 0.3.40)'
        required: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Determine the target version from the tag or manual input,
      # then pre-decrement the patch so the build script's +1 auto-bump
      # produces exactly the right version string in the installer filename.
      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "push") {
            $ver = "${{ github.ref_name }}" -replace '^v', ''
          } else {
            $ver = "${{ github.event.inputs.version }}" -replace '^v', ''
          }
          $parts  = $ver -split '\.'
          $prev   = "$($parts[0]).$($parts[1]).$([int]$parts[2] - 1)"
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "prev=$prev"   | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Target version: $ver  (pre-setting package.json to $prev so build bumps to $ver)"

      - name: Pre-set package.json version
        shell: pwsh
        run: |
          $raw = Get-Content package.json -Raw
          $pkg = $raw | ConvertFrom-Json
          $pkg.version = "${{ steps.ver.outputs.prev }}"
          $pkg | ConvertTo-Json -Depth 20 | Set-Content package.json -Encoding UTF8

      - name: Cache root node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-root-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-root-npm-

      - name: Cache frontend node_modules
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-frontend-npm-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: ${{ runner.os }}-frontend-npm-

      # npm install (not ci) lets postinstall run:
      #   - root postinstall: "cd frontend && npm install" sets up frontend deps
      #   - node-llama-cpp postinstall downloads the GPU/CPU backends needed for packaging
      - name: Install all dependencies
        run: npm install

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Build CUDA + CPU installers
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          WIN_CSC_LINK: ''
        run: node scripts/build-installers.js

      - name: List dist output
        shell: pwsh
        run: Get-ChildItem dist -Filter *.exe | Select-Object Name, @{N='MB';E={[math]::Round($_.Length/1MB,1)}}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: guIDE v${{ steps.ver.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/guIDE-${{ steps.ver.outputs.version }}-cuda-x64-setup.exe
            dist/guIDE-${{ steps.ver.outputs.version }}-cpu-x64-setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
