name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install frontend dependencies
        run: npm ci --force || (sleep 5 && npm ci --force)
        working-directory: frontend

      - name: Build frontend
        run: npm run build:renderer

      - name: Install ImageMagick
        run: choco install imagemagick --yes

      - name: Generate multi-size app icon
        shell: pwsh
        run: ./scripts/generate-icon.ps1

      - name: Build CPU installer
        run: node scripts/build-installers.js --cpu

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: guide-installers
          path: dist/*.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
