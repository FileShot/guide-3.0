        run: |
          node -e "const fs=require('fs'); const version='${{ needs.prepare.outputs.version }}'; const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.version=version; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"

      - name: Install setuptools (provides distutils for node-gyp)
        run: pip install setuptools

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build renderer
        run: npm run build:renderer

      - name: Require Windows code signing secrets
        shell: bash
        env:
          W_LINK: ${{ secrets.WIN_CSC_LINK }}
          W_PW: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          if [ -z "$W_LINK" ] || [ -z "$W_PW" ]; then
            echo '::error::WIN_CSC_LINK and/or WIN_CSC_KEY_PASSWORD is empty. Run: pwsh scripts/set-windows-signing-secrets.ps1 -Repo FileShot/guide-3.0 -PfxPath <path-to-code-signing.pfx>'
            exit 1
          fi

      - name: Build Windows CUDA installer
        run: npx electron-builder --win --x64 --config electron-builder.nosign.cuda.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Verify CUDA installer Authenticode signature
        shell: pwsh
        run: |
          function Test-SignedFile {
            param([Parameter(Mandatory)][string]$Path)
            if (-not (Test-Path $Path)) { throw "Missing file: $Path" }
            Write-Host "Verifying: $Path"
            $sigtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match '\\x64\\signtool\.exe$' } |
              Sort-Object FullName -Descending | Select-Object -First 1
            if ($sigtool) {
              & $sigtool.FullName verify /pa $Path
              if ($LASTEXITCODE -eq 0) { return }
              Write-Host "::warning::signtool verify exit $LASTEXITCODE — checking Authenticode status"
            } else {
              Write-Host '::warning::signtool.exe not found — using Get-AuthenticodeSignature only'
            }
            $sig = Get-AuthenticodeSignature -FilePath $Path
            Write-Host "Subject:" $sig.SignerCertificate.Subject
            Write-Host "Status:" $sig.Status
            Write-Host "StatusMessage:" $sig.StatusMessage
            $fatal = @('NotSigned', 'HashMismatch')
            if ($sig.Status -in $fatal) {
              throw "Authenticode $($sig.Status) on $Path — file is not signed or digest wrong."
            }
            if ($sig.Status -eq 'Valid') { return }
            if ($sig.SignerCertificate -and $sig.Status -eq 'UnknownError') {
              Write-Host "::warning::Authenticode UnknownError on CI runner but signer certificate is present (common for NSIS on GitHub-hosted Windows). signtool /pa may also fail here; verify on a physical PC if needed."
              return
            }
            throw "Authenticode status $($sig.Status) on $Path — no acceptable signature."
          }
          $setup = Get-ChildItem -Path dist-electron -Filter 'guIDE-*-cuda-x64-setup.exe' -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $setup) { throw 'NSIS guIDE-*-cuda-x64-setup.exe not found' }
          Test-SignedFile $setup.FullName
          $unpacked = Join-Path dist-electron 'win-unpacked/guIDE.exe'
          if (Test-Path $unpacked) { Test-SignedFile $unpacked }

      - name: Upload artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: windows-cuda
          path: dist-electron/guIDE-*-cuda-x64-setup.exe
          retention-days: 30

  # ─── Linux CPU ──────────────────────────────────────────────
  build-linux-cpu:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set build version
        run: |
          node -e "const fs=require('fs'); const version='${{ needs.prepare.outputs.version }}'; const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.version=version; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build renderer
        run: npm run build:renderer

      - name: Convert icon to PNG
        run: |
          mkdir -p build
          if command -v convert &> /dev/null; then
            convert build/icon.ico[0] build/icon.png
          else
            sudo apt-get install -y imagemagick && convert build/icon.ico[0] build/icon.png
          fi

      - name: Build Linux CPU AppImage
        run: npx electron-builder --linux --x64 --config electron-builder.nosign.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: linux-cpu
          path: dist-electron/guIDE-*-cpu-linux-x64.AppImage
          retention-days: 30

  # ─── Linux CUDA ─────────────────────────────────────────────
  build-linux-cuda:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set build version
        run: |
          node -e "const fs=require('fs'); const version='${{ needs.prepare.outputs.version }}'; const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.version=version; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build renderer
        run: npm run build:renderer

      - name: Convert icon to PNG
        run: |
          mkdir -p build
          if command -v convert &> /dev/null; then
            convert build/icon.ico[0] build/icon.png
          else
            sudo apt-get install -y imagemagick && convert build/icon.ico[0] build/icon.png
          fi

      - name: Build Linux CUDA AppImage
        run: npx electron-builder --linux --x64 --config electron-builder.nosign.cuda.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: linux-cuda
          path: dist-electron/guIDE-*-cuda-linux-x64.AppImage
          retention-days: 30

  # ─── macOS ──────────────────────────────────────────────────
  build-mac:
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set build version
        run: |
          node -e "const fs=require('fs'); const version='${{ needs.prepare.outputs.version }}'; const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.version=version; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"

      - name: Install setuptools (provides distutils for node-gyp)
        run: pip install setuptools

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build renderer
        run: npm run build:renderer

      - name: Convert icon for macOS
        run: |
          mkdir -p build
          sips -s format png build/icon.ico --out build/icon_src.png 2>/dev/null || cp build/icon.ico build/icon_src.png
          sips -z 512 512 build/icon_src.png --out build/icon_512.png
          mkdir -p build/icon.iconset
          sips -z 16 16     build/icon_512.png --out build/icon.iconset/icon_16x16.png
          sips -z 32 32     build/icon_512.png --out build/icon.iconset/icon_16x16@2x.png
          sips -z 32 32     build/icon_512.png --out build/icon.iconset/icon_32x32.png
          sips -z 64 64     build/icon_512.png --out build/icon.iconset/icon_32x32@2x.png
          sips -z 128 128   build/icon_512.png --out build/icon.iconset/icon_128x128.png
          sips -z 256 256   build/icon_512.png --out build/icon.iconset/icon_128x128@2x.png
          sips -z 256 256   build/icon_512.png --out build/icon.iconset/icon_256x256.png
          sips -z 512 512   build/icon_512.png --out build/icon.iconset/icon_256x256@2x.png
          cp build/icon_512.png build/icon.iconset/icon_512x512.png
          iconutil -c icns build/icon.iconset -o build/icon.icns

      - name: Build macOS DMG (CPU, x64 + arm64)
        run: npx electron-builder --mac --x64 --arm64 --config electron-builder.nosign.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: mac-cpu
          path: dist-electron/guIDE-*-cpu-mac-*.dmg
          retention-days: 30

  # ─── GitHub Release ─────────────────────────────────────────
  release:
    needs: [prepare, build-windows-cpu, build-windows-cuda, build-linux-cpu, build-linux-cuda, build-mac]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          files: |
            artifacts/windows-cpu/*
            artifacts/windows-cuda/*
            artifacts/linux-cpu/*
            artifacts/linux-cuda/*
            artifacts/mac-cpu/*
          draft: false
          prerelease: false
          generate_release_notes: true
          name: ${{ needs.prepare.outputs.release_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
