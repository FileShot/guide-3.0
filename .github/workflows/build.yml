name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. 3.0.0) — leave blank to use package.json'
        required: false

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      release_name: ${{ steps.version.outputs.release_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - id: version
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          INPUT_VERSION='${{ github.event.inputs.version }}'

          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          elif [[ '${{ github.ref }}' == refs/tags/v* ]]; then
            VERSION='${{ github.ref_name }}'
            VERSION="${VERSION#v}"
          else
            VERSION="$PACKAGE_VERSION"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_name=guIDE v$VERSION" >> "$GITHUB_OUTPUT"

  # ─── Windows CPU ────────────────────────────────────────────
  build-windows-cpu:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set build version
        shell: bash
        run: |
          node -e "const fs=require('fs'); const version='${{ needs.prepare.outputs.version }}'; const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.version=version; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"

      - name: Install setuptools (provides distutils for node-gyp)
        run: pip install setuptools

      - name: Install cmake and ninja
        run: |
          choco install cmake.install --version=4.2.1
          choco install cmake --version=4.2.1
          choco install ninja

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build renderer
        run: npm run build:renderer

      - name: Download & build llama.cpp (latest, CPU)
        run: |
          curl -L -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://github.com/ggml-org/llama.cpp/archive/refs/tags/b9253.tar.gz \
            -o /tmp/llama.tar.gz
          mkdir -p /tmp/llama-meta
          cp node_modules/node-llama-cpp/llama/binariesGithubRelease.json /tmp/llama-meta/ 2>/dev/null || true
          cp node_modules/node-llama-cpp/llama/llama.cpp.info.json /tmp/llama-meta/ 2>/dev/null || true
          cp node_modules/node-llama-cpp/llama/package.json /tmp/llama-meta/ 2>/dev/null || true
          cp node_modules/node-llama-cpp/llama/gitRelease.bundle /tmp/llama-meta/ 2>/dev/null || true
          rm -rf node_modules/node-llama-cpp/llama
          mkdir -p node_modules/node-llama-cpp/llama
          tar -xzf /tmp/llama.tar.gz -C node_modules/node-llama-cpp/llama --strip-components=1
          cp /tmp/llama-meta/* node_modules/node-llama-cpp/llama/ 2>/dev/null || true
          echo '{"release": "b9253"}' > node_modules/node-llama-cpp/llama/binariesGithubRelease.json
          echo '{"tag": "b9253", "llamaCppGithubRepo": "ggml-org/llama.cpp"}' > node_modules/node-llama-cpp/llama/llama.cpp.info.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Windows CPU installer
        run: npx electron-builder --win --x64 --config electron-builder.nosign.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: windows-cpu
          path: dist-electron/guIDE-*-cpu-x64-setup.exe
          retention-days: 30

  # ─── Windows CUDA ───────────────────────────────────────────
  build-windows-cuda:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set build version
        shell: bash
        run: |
          node -e "const fs=require('fs'); const version='${{ needs.prepare.outputs.version }}'; const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.version=version; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"

      - name: Install setuptools (provides distutils for node-gyp)
        run: pip install setuptools

      - name: Install cmake and ninja
        run: |
          choco install cmake.install --version=4.2.1
          choco install cmake --version=4.2.1
          choco install ninja

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build renderer
        run: npm run build:renderer

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '13.1.0'
          method: 'network'

      - name: Download & build llama.cpp (latest, CUDA)
        run: |
          curl -L -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://github.com/ggml-org/llama.cpp/archive/refs/tags/b9253.tar.gz \
            -o /tmp/llama.tar.gz
          mkdir -p /tmp/llama-meta
          cp node_modules/node-llama-cpp/llama/binariesGithubRelease.json /tmp/llama-meta/ 2>/dev/null || true
          cp node_modules/node-llama-cpp/llama/llama.cpp.info.json /tmp/llama-meta/ 2>/dev/null || true
          cp node_modules/node-llama-cpp/llama/package.json /tmp/llama-meta/ 2>/dev/null || true
          cp node_modules/node-llama-cpp/llama/gitRelease.bundle /tmp/llama-meta/ 2>/dev/null || true
          rm -rf node_modules/node-llama-cpp/llama
          mkdir -p node_modules/node-llama-cpp/llama
          tar -xzf /tmp/llama.tar.gz -C node_modules/node-llama-cpp/llama --strip-components=1
          cp /tmp/llama-meta/* node_modules/node-llama-cpp/llama/ 2>/dev/null || true
          echo '{"release": "b9253"}' > node_modules/node-llama-cpp/llama/binariesGithubRelease.json
          echo '{"tag": "b9253", "llamaCppGithubRepo": "ggml-org/llama.cpp"}' > node_modules/node-llama-cpp/llama/llama.cpp.info.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Windows CUDA installer
        run: npx electron-builder --win --x64 --config electron-builder.nosign.cuda.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: windows-cuda
          path: dist-electron/guIDE-*-cuda-x64-setup.exe
          retention-days: 30

  # ─── Linux CPU ──────────────────────────────────────────────
  build-linux-cpu:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set build version
        run: |
          node -e "const fs=require('fs'); const version='${{ needs.prepare.outputs.version }}'; const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.version=version; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"

      - name: Install cmake, ninja, and setuptools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
          wget -c https://github.com/Kitware/CMake/releases/download/v4.2.1/cmake-4.2.1-linux-x86_64.tar.gz
          sudo tar --strip-components=1 -C /usr/local -xzf cmake-4.2.1-linux-x86_64.tar.gz
          rm -f ./cmake-4.2.1-linux-x86_64.tar.gz
          cmake --version
          pip install setuptools

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build renderer
        run: npm run build:renderer

      - name: Convert icon to PNG
        run: |
          mkdir -p build
          if command -v convert &> /dev/null; then
            convert build/icon.ico[0] build/icon.png
          else
            sudo apt-get install -y imagemagick && convert build/icon.ico[0] build/icon.png
          fi

      - name: Download & build llama.cpp (latest, CPU)
        run: |
          curl -L -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://github.com/ggml-org/llama.cpp/archive/refs/tags/b9253.tar.gz \
            -o /tmp/llama.tar.gz
          mkdir -p /tmp/llama-meta
          cp node_modules/node-llama-cpp/llama/binariesGithubRelease.json /tmp/llama-meta/ 2>/dev/null || true
          cp node_modules/node-llama-cpp/llama/llama.cpp.info.json /tmp/llama-meta/ 2>/dev/null || true
          cp node_modules/node-llama-cpp/llama/package.json /tmp/llama-meta/ 2>/dev/null || true
          cp node_modules/node-llama-cpp/llama/gitRelease.bundle /tmp/llama-meta/ 2>/dev/null || true
          rm -rf node_modules/node-llama-cpp/llama
          mkdir -p node_modules/node-llama-cpp/llama
          tar -xzf /tmp/llama.tar.gz -C node_modules/node-llama-cpp/llama --strip-components=1
          cp /tmp/llama-meta/* node_modules/node-llama-cpp/llama/ 2>/dev/null || true
          echo '{"release": "b9253"}' > node_modules/node-llama-cpp/llama/binariesGithubRelease.json
          echo '{"tag": "b9253", "llamaCppGithubRepo": "ggml-org/llama.cpp"}' > node_modules/node-llama-cpp/llama/llama.cpp.info.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Linux CPU AppImage
        run: npx electron-builder --linux --x64 --config electron-builder.nosign.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: linux-cpu
          path: dist-electron/guIDE-*-cpu-linux-x64.AppImage
          retention-days: 30

  # ─── Linux CUDA ─────────────────────────────────────────────
  build-linux-cuda:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set build version
        run: |
          node -e "const fs=require('fs'); const version='${{ needs.prepare.outputs.version }}'; const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.version=version; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"

      - name: Install cmake, ninja, and setuptools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
          wget -c https://github.com/Kitware/CMake/releases/download/v4.2.1/cmake-4.2.1-linux-x86_64.tar.gz
          sudo tar --strip-components=1 -C /usr/local -xzf cmake-4.2.1-linux-x86_64.tar.gz
          rm -f ./cmake-4.2.1-linux-x86_64.tar.gz
          cmake --version
          pip install setuptools

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build renderer
        run: npm run build:renderer

      - name: Convert icon to PNG
        run: |
          mkdir -p build
          if command -v convert &> /dev/null; then
            convert build/icon.ico[0] build/icon.png
          else
            sudo apt-get install -y imagemagick && convert build/icon.ico[0] build/icon.png
          fi

      - name: Install CUDA Toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '13.1.0'
          method: 'network'

      - name: Download & build llama.cpp (latest, CUDA)
        run: |
          curl -L -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://github.com/ggml-org/llama.cpp/archive/refs/tags/b9253.tar.gz \
            -o /tmp/llama.tar.gz
          mkdir -p /tmp/llama-meta
          cp node_modules/node-llama-cpp/llama/binariesGithubRelease.json /tmp/llama-meta/ 2>/dev/null || true
          cp node_modules/node-llama-cpp/llama/llama.cpp.info.json /tmp/llama-meta/ 2>/dev/null || true
          cp node_modules/node-llama-cpp/llama/package.json /tmp/llama-meta/ 2>/dev/null || true
          cp node_modules/node-llama-cpp/llama/gitRelease.bundle /tmp/llama-meta/ 2>/dev/null || true
          rm -rf node_modules/node-llama-cpp/llama
          mkdir -p node_modules/node-llama-cpp/llama
          tar -xzf /tmp/llama.tar.gz -C node_modules/node-llama-cpp/llama --strip-components=1
          cp /tmp/llama-meta/* node_modules/node-llama-cpp/llama/ 2>/dev/null || true
          echo '{"release": "b9253"}' > node_modules/node-llama-cpp/llama/binariesGithubRelease.json
          echo '{"tag": "b9253", "llamaCppGithubRepo": "ggml-org/llama.cpp"}' > node_modules/node-llama-cpp/llama/llama.cpp.info.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Linux CUDA AppImage
        run: npx electron-builder --linux --x64 --config electron-builder.nosign.cuda.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: linux-cuda
          path: dist-electron/guIDE-*-cuda-linux-x64.AppImage
          retention-days: 30

  # ─── macOS ──────────────────────────────────────────────────
  build-mac:
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set build version
        run: |
          node -e "const fs=require('fs'); const version='${{ needs.prepare.outputs.version }}'; const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.version=version; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"

      - name: Install cmake, ninja, and setuptools
        run: |
          brew install cmake ninja
          cmake --version
          pip install setuptools

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build renderer
        run: npm run build:renderer

      - name: Convert icon for macOS
        run: |
          mkdir -p build
          sips -s format png build/icon.ico --out build/icon_src.png 2>/dev/null || cp build/icon.ico build/icon_src.png
          sips -z 512 512 build/icon_src.png --out build/icon_512.png
          mkdir -p build/icon.iconset
          sips -z 16 16     build/icon_512.png --out build/icon.iconset/icon_16x16.png
          sips -z 32 32     build/icon_512.png --out build/icon.iconset/icon_16x16@2x.png
          sips -z 32 32     build/icon_512.png --out build/icon.iconset/icon_32x32.png
          sips -z 64 64     build/icon_512.png --out build/icon.iconset/icon_32x32@2x.png
          sips -z 128 128   build/icon_512.png --out build/icon.iconset/icon_128x128.png
          sips -z 256 256   build/icon_512.png --out build/icon.iconset/icon_128x128@2x.png
          sips -z 256 256   build/icon_512.png --out build/icon.iconset/icon_256x256.png
          sips -z 512 512   build/icon_512.png --out build/icon.iconset/icon_256x256@2x.png
          cp build/icon_512.png build/icon.iconset/icon_512x512.png
          iconutil -c icns build/icon.iconset -o build/icon.icns

      - name: Download & build llama.cpp (latest, Metal)
        run: |
          curl -L -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://github.com/ggml-org/llama.cpp/archive/refs/tags/b9253.tar.gz \
            -o /tmp/llama.tar.gz
          mkdir -p /tmp/llama-meta
          cp node_modules/node-llama-cpp/llama/binariesGithubRelease.json /tmp/llama-meta/ 2>/dev/null || true
          cp node_modules/node-llama-cpp/llama/llama.cpp.info.json /tmp/llama-meta/ 2>/dev/null || true
          cp node_modules/node-llama-cpp/llama/package.json /tmp/llama-meta/ 2>/dev/null || true
          cp node_modules/node-llama-cpp/llama/gitRelease.bundle /tmp/llama-meta/ 2>/dev/null || true
          rm -rf node_modules/node-llama-cpp/llama
          mkdir -p node_modules/node-llama-cpp/llama
          tar -xzf /tmp/llama.tar.gz -C node_modules/node-llama-cpp/llama --strip-components=1
          cp /tmp/llama-meta/* node_modules/node-llama-cpp/llama/ 2>/dev/null || true
          echo '{"release": "b9253"}' > node_modules/node-llama-cpp/llama/binariesGithubRelease.json
          echo '{"tag": "b9253", "llamaCppGithubRepo": "ggml-org/llama.cpp"}' > node_modules/node-llama-cpp/llama/llama.cpp.info.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build macOS DMG (CPU, x64 + arm64)
        run: npx electron-builder --mac --x64 --arm64 --config electron-builder.nosign.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: mac-cpu
          path: dist-electron/guIDE-*-cpu-mac-*.dmg
          retention-days: 30

  # ─── GitHub Release ─────────────────────────────────────────
  release:
    needs: [prepare, build-windows-cpu, build-windows-cuda, build-linux-cpu, build-linux-cuda, build-mac]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          files: |
            artifacts/windows-cpu/*
            artifacts/windows-cuda/*
            artifacts/linux-cpu/*
            artifacts/linux-cuda/*
            artifacts/mac-cpu/*
          draft: false
          prerelease: false
          generate_release_notes: true
          name: ${{ needs.prepare.outputs.release_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
