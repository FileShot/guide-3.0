name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. 3.0.0) — leave blank to use package.json'
        required: false

permissions:
  contents: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      release_name: ${{ steps.version.outputs.release_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - id: version
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          INPUT_VERSION='${{ github.event.inputs.version }}'

          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          elif [[ '${{ github.ref }}' == refs/tags/v* ]]; then
            VERSION='${{ github.ref_name }}'
            VERSION="${VERSION#v}"
          else
            VERSION="$PACKAGE_VERSION"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_name=guIDE v$VERSION" >> "$GITHUB_OUTPUT"

  # ─── Windows CPU ────────────────────────────────────────────
  build-windows-cpu:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set build version
        shell: bash
        run: |
          node -e "const fs=require('fs'); const version='${{ needs.prepare.outputs.version }}'; const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.version=version; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"

      - name: Install setuptools (provides distutils for node-gyp)
        run: pip install setuptools

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build renderer
        run: npm run build:renderer

      - name: Build Windows CPU installer
        run: npx electron-builder --win --x64 --config electron-builder.nosign.json --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: windows-cpu
          path: dist-electron/guIDE-*-cpu-x64-setup.exe
          retention-days: 30

  # ─── Windows CUDA ───────────────────────────────────────────
  build-windows-cuda:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set build version
        shell: bash
        run: |
          node -e "const fs=require('fs'); const version='${{ needs.prepare.outputs.version }}'; const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.version=version; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"

      - name: Install setuptools (provides distutils for node-gyp)
        run: pip install setuptools

      - uses: Jimver/cuda-toolkit@v0.2.15
        with:
          cuda: '12.4.0'

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build renderer
        run: npm run build:renderer

      - name: Build Windows CUDA installer
        run: npx electron-builder --win --x64 --config electron-builder.nosign.cuda.json --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: windows-cuda
          path: dist-electron/guIDE-*-cuda-x64-setup.exe
          retention-days: 30

  # ─── Linux CPU ──────────────────────────────────────────────
  build-linux-cpu:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set build version
        run: |
          node -e "const fs=require('fs'); const version='${{ needs.prepare.outputs.version }}'; const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.version=version; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build renderer
        run: npm run build:renderer

      - name: Convert icon to PNG
        run: |
          mkdir -p build
          if command -v convert &> /dev/null; then
            convert build/icon.ico[0] build/icon.png
          else
            sudo apt-get install -y imagemagick && convert build/icon.ico[0] build/icon.png
          fi

      - name: Verify node-llama-cpp Linux CPU backends
        run: |
          test -d node_modules/@node-llama-cpp/linux-x64 || (echo "Missing @node-llama-cpp/linux-x64" && exit 1)
          test -d node_modules/@node-llama-cpp/linux-x64-vulkan || echo "warn: linux-x64-vulkan not installed (CPU fallback may be limited)"

      - name: Build Linux CPU AppImage
        run: npx electron-builder --linux --x64 --config electron-builder.nosign.linux.json --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: linux-cpu
          path: dist-electron/guIDE-*-cpu-linux-x64.AppImage
          retention-days: 30

  # ─── Linux CUDA ─────────────────────────────────────────────
  build-linux-cuda:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set build version
        run: |
          node -e "const fs=require('fs'); const version='${{ needs.prepare.outputs.version }}'; const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.version=version; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - uses: Jimver/cuda-toolkit@v0.2.15
        with:
          cuda: '12.4.0'

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build renderer
        run: npm run build:renderer

      - name: Convert icon to PNG
        run: |
          mkdir -p build
          if command -v convert &> /dev/null; then
            convert build/icon.ico[0] build/icon.png
          else
            sudo apt-get install -y imagemagick && convert build/icon.ico[0] build/icon.png
          fi

      - name: Verify node-llama-cpp Linux CUDA backends
        run: |
          test -d node_modules/@node-llama-cpp/linux-x64-cuda || (echo "Missing @node-llama-cpp/linux-x64-cuda" && exit 1)
          test -d node_modules/@node-llama-cpp/linux-x64 || echo "warn: linux-x64 CPU fallback not installed"

      - name: Build Linux CUDA AppImage
        run: npx electron-builder --linux --x64 --config electron-builder.nosign.cuda.linux.json --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: linux-cuda
          path: dist-electron/guIDE-*-cuda-linux-x64.AppImage
          retention-days: 30

  # ─── Windows CPU Legacy (Haswell+, no ADX) ───────────────────
  build-windows-cpu-legacy:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set build version
        shell: bash
        run: |
          node -e "const fs=require('fs'); const version='${{ needs.prepare.outputs.version }}'; const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.version=version; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"

      - name: Install setuptools (provides distutils for node-gyp)
        run: pip install setuptools

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install cmake
        run: choco install cmake -y --no-progress

      - name: Prepare legacy runtime (Electron 28/26/22 + Haswell llama + node-pty)
        shell: bash
        run: node scripts/prepare-legacy-windows.mjs
        env:
          LLAMA_CPP_RELEASE: b9253

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build renderer
        run: npm run build:renderer

      - name: Build Windows CPU Legacy installer
        shell: bash
        run: |
          EV=$(tr -d '\n\r' < build/legacy-electron-version.txt)
          npx electron-builder --win --x64 --config electron-builder.nosign.legacy.json --config.electronVersion="$EV" --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: windows-cpu-legacy
          path: dist-electron/guIDE-*-cpu-legacy-x64-setup.exe
          retention-days: 30

  # ─── Windows CUDA Legacy (Haswell CPU + CUDA) ────────────────
  build-windows-cuda-legacy:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set build version
        shell: bash
        run: |
          node -e "const fs=require('fs'); const version='${{ needs.prepare.outputs.version }}'; const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.version=version; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"

      - name: Install setuptools (provides distutils for node-gyp)
        run: pip install setuptools

      - uses: Jimver/cuda-toolkit@v0.2.15
        with:
          cuda: '12.4.0'

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install cmake
        run: choco install cmake -y --no-progress

      - name: Prepare legacy CUDA runtime (Electron + Haswell llama + node-pty)
        shell: bash
        run: node scripts/prepare-legacy-windows.mjs --cuda
        env:
          LLAMA_CPP_RELEASE: b9253

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build renderer
        run: npm run build:renderer

      - name: Build Windows CUDA Legacy installer
        shell: bash
        run: |
          EV=$(tr -d '\n\r' < build/legacy-electron-version.txt)
          npx electron-builder --win --x64 --config electron-builder.nosign.legacy.cuda.json --config.electronVersion="$EV" --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: windows-cuda-legacy
          path: dist-electron/guIDE-*-cuda-legacy-x64-setup.exe
          retention-days: 30

  # ─── Linux CPU Legacy (Haswell+, no ADX) ─────────────────────
  build-linux-cpu-legacy:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set build version
        run: |
          node -e "const fs=require('fs'); const version='${{ needs.prepare.outputs.version }}'; const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.version=version; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"

      - name: Install build tools (QEMU Haswell gate + objdump + xvfb)
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake qemu-user-static binutils xvfb

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Prepare legacy Linux runtime (Electron 22 Haswell-safe + x86-64-v2 llama)
        run: node scripts/prepare-legacy-linux.mjs
        env:
          LLAMA_CPP_RELEASE: b9253

      - name: Assert legacy Electron <= 22 (blocks silent 30.x ship like v0.3.128)
        run: node scripts/assert-legacy-electron-version.mjs

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build renderer
        run: npm run build:renderer

      - name: Convert icon to PNG
        run: |
          mkdir -p build
          if command -v convert &> /dev/null; then
            convert build/icon.ico[0] build/icon.png
          else
            sudo apt-get install -y imagemagick && convert build/icon.ico[0] build/icon.png
          fi

      - name: Verify legacy llama uses local build only
        run: |
          test -d node_modules/node-llama-cpp/llama/localBuilds || (echo "missing localBuilds" && exit 1)
          test ! -d node_modules/@node-llama-cpp/linux-x64 || (echo "prebuilt linux-x64 must be removed" && exit 1)

      - name: Re-patch Node 16 deps before package
        run: node scripts/patch-legacy-node16-deps.mjs

      - name: Build Linux CPU Legacy AppImage
        run: |
          EV=$(tr -d '\n\r' < build/legacy-electron-version.txt)
          npx electron-builder --linux --x64 --config electron-builder.nosign.legacy.linux.json --config.electronVersion="$EV" --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify legacy AppImage on Haswell (QEMU + llama load)
        run: |
          APP=$(ls -1 dist-electron/guIDE-*-cpu-legacy-linux-x64.AppImage | head -1)
          xvfb-run -a node scripts/verify-legacy-haswell-artifact.mjs --appimage "$APP"

      - name: Upload artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: linux-cpu-legacy
          path: dist-electron/guIDE-*-cpu-legacy-linux-x64.AppImage
          retention-days: 30

  # ─── Linux CUDA Legacy (Haswell CPU + CUDA) ──────────────────
  build-linux-cuda-legacy:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set build version
        run: |
          node -e "const fs=require('fs'); const version='${{ needs.prepare.outputs.version }}'; const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.version=version; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"

      - name: Install build tools (QEMU Haswell gate + objdump + xvfb)
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake qemu-user-static binutils xvfb

      - uses: Jimver/cuda-toolkit@v0.2.15
        with:
          cuda: '12.4.0'

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Prepare legacy Linux CUDA runtime (Electron + Haswell llama + node-pty)
        run: node scripts/prepare-legacy-linux.mjs --cuda
        env:
          LLAMA_CPP_RELEASE: b9253

      - name: Assert legacy Electron <= 22 (blocks silent 30.x ship like v0.3.128)
        run: node scripts/assert-legacy-electron-version.mjs

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build renderer
        run: npm run build:renderer

      - name: Convert icon to PNG
        run: |
          mkdir -p build
          if command -v convert &> /dev/null; then
            convert build/icon.ico[0] build/icon.png
          else
            sudo apt-get install -y imagemagick && convert build/icon.ico[0] build/icon.png
          fi

      - name: Verify legacy CUDA llama local build
        run: |
          test -d node_modules/node-llama-cpp/llama/localBuilds || (echo "missing localBuilds after Haswell CUDA compile" && exit 1)
          test ! -d node_modules/@node-llama-cpp/linux-x64-cuda || (echo "prebuilt linux-x64-cuda must be removed" && exit 1)

      - name: Re-patch Node 16 deps before package
        run: node scripts/patch-legacy-node16-deps.mjs

      - name: Build Linux CUDA Legacy AppImage
        run: |
          EV=$(tr -d '\n\r' < build/legacy-electron-version.txt)
          npx electron-builder --linux --x64 --config electron-builder.nosign.legacy.cuda.linux.json --config.electronVersion="$EV" --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify legacy CUDA AppImage on Haswell (QEMU + llama load)
        run: |
          APP=$(ls -1 dist-electron/guIDE-*-cuda-legacy-linux-x64.AppImage | head -1)
          xvfb-run -a node scripts/verify-legacy-haswell-artifact.mjs --appimage "$APP"

      - name: Upload artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: linux-cuda-legacy
          path: dist-electron/guIDE-*-cuda-legacy-linux-x64.AppImage
          retention-days: 30

  # ─── macOS ──────────────────────────────────────────────────
  build-mac:
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set build version
        run: |
          node -e "const fs=require('fs'); const version='${{ needs.prepare.outputs.version }}'; const pkg=JSON.parse(fs.readFileSync('package.json','utf8')); pkg.version=version; fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');"

      - name: Install setuptools (provides distutils for node-gyp)
        run: pip install setuptools

      - name: Install cmake
        run: brew install cmake

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build renderer
        run: npm run build:renderer

      - name: Convert icon for macOS
        run: |
          mkdir -p build
          sips -s format png build/icon.ico --out build/icon_src.png 2>/dev/null || cp build/icon.ico build/icon_src.png
          sips -z 512 512 build/icon_src.png --out build/icon_512.png
          mkdir -p build/icon.iconset
          sips -z 16 16     build/icon_512.png --out build/icon.iconset/icon_16x16.png
          sips -z 32 32     build/icon_512.png --out build/icon.iconset/icon_16x16@2x.png
          sips -z 32 32     build/icon_512.png --out build/icon.iconset/icon_32x32.png
          sips -z 64 64     build/icon_512.png --out build/icon.iconset/icon_32x32@2x.png
          sips -z 128 128   build/icon_512.png --out build/icon.iconset/icon_128x128.png
          sips -z 256 256   build/icon_512.png --out build/icon.iconset/icon_128x128@2x.png
          sips -z 256 256   build/icon_512.png --out build/icon.iconset/icon_256x256.png
          sips -z 512 512   build/icon_512.png --out build/icon.iconset/icon_256x256@2x.png
          cp build/icon_512.png build/icon.iconset/icon_512x512.png
          iconutil -c icns build/icon.iconset -o build/icon.icns

      - name: Build macOS DMG (CPU, x64 + arm64)
        run: npx electron-builder --mac --x64 --arm64 --config electron-builder.nosign.json --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: mac-cpu
          path: dist-electron/guIDE-*-cpu-mac-*.dmg
          retention-days: 30

  # ─── GitHub Release ─────────────────────────────────────────
  release:
    needs: [prepare, build-windows-cpu, build-windows-cuda, build-linux-cpu, build-linux-cuda, build-windows-cpu-legacy, build-windows-cuda-legacy, build-linux-cpu-legacy, build-linux-cuda-legacy, build-mac]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          files: |
            artifacts/windows-cpu/*
            artifacts/windows-cuda/*
            artifacts/windows-cpu-legacy/*
            artifacts/windows-cuda-legacy/*
            artifacts/linux-cpu/*
            artifacts/linux-cuda/*
            artifacts/linux-cpu-legacy/*
            artifacts/linux-cuda-legacy/*
            artifacts/mac-cpu/*
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
          make_latest: true
          generate_release_notes: true
          name: ${{ needs.prepare.outputs.release_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
